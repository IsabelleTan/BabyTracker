<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 150" width="800" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif">

  <!-- Background zones -->
  <!-- Daytime 06:00–19:00 = x 40–560, width 520 -->
  <rect x="40"  y="28" width="520" height="68" fill="#eff6ff" rx="3"/>
  <!-- Evening cluster 19:00–21:00 = x 560–640, width 80 -->
  <rect x="560" y="28" width="80"  height="68" fill="#fffbeb" rx="3"/>
  <!-- Night 21:00–24:00 = x 640–760, width 120 -->
  <rect x="640" y="28" width="120" height="68" fill="#eef2ff" rx="3"/>

  <!-- Zone labels -->
  <text x="300" y="44" text-anchor="middle" font-size="10" font-weight="600" fill="#93c5fd" letter-spacing="0.8">DAYTIME FEEDS</text>
  <text x="600" y="42" text-anchor="middle" font-size="9"  font-weight="600" fill="#fbbf24" letter-spacing="0.5">EVENING</text>
  <text x="600" y="53" text-anchor="middle" font-size="9"  font-weight="600" fill="#fbbf24" letter-spacing="0.5">CLUSTER</text>
  <text x="700" y="44" text-anchor="middle" font-size="10" font-weight="600" fill="#a5b4fc" letter-spacing="0.8">NIGHT</text>

  <!-- Timeline axis -->
  <line x1="40" y1="75" x2="755" y2="75" stroke="#cbd5e1" stroke-width="1.5"/>
  <polygon points="755,71 764,75 755,79" fill="#cbd5e1"/>

  <!-- Tick marks at every 3 hours -->
  <line x1="40"  y1="72" x2="40"  y2="82" stroke="#94a3b8" stroke-width="1"/>
  <line x1="160" y1="72" x2="160" y2="82" stroke="#94a3b8" stroke-width="1"/>
  <line x1="280" y1="72" x2="280" y2="82" stroke="#94a3b8" stroke-width="1"/>
  <line x1="400" y1="72" x2="400" y2="82" stroke="#94a3b8" stroke-width="1"/>
  <line x1="520" y1="72" x2="520" y2="82" stroke="#94a3b8" stroke-width="1"/>
  <line x1="640" y1="72" x2="640" y2="82" stroke="#94a3b8" stroke-width="1"/>
  <line x1="760" y1="72" x2="760" y2="82" stroke="#94a3b8" stroke-width="1"/>

  <!-- Axis time labels -->
  <text x="40"  y="95" text-anchor="middle" font-size="10" fill="#94a3b8">06:00</text>
  <text x="160" y="95" text-anchor="middle" font-size="10" fill="#94a3b8">09:00</text>
  <text x="280" y="95" text-anchor="middle" font-size="10" fill="#94a3b8">12:00</text>
  <text x="400" y="95" text-anchor="middle" font-size="10" fill="#94a3b8">15:00</text>
  <text x="520" y="95" text-anchor="middle" font-size="10" fill="#94a3b8">18:00</text>
  <text x="640" y="95" text-anchor="middle" font-size="10" fill="#94a3b8">21:00</text>
  <text x="760" y="95" text-anchor="middle" font-size="10" fill="#94a3b8">00:00</text>

  <!--
    Scale: 40 px per hour  (720 px / 18 hours, axis 40→760)
    x = 40 + (h - 6)*40 + (m/60)*40
  -->

  <!-- Daytime feed markers (blue) -->
  <!-- 07:00 → x=80 -->
  <circle cx="80"  cy="75" r="6" fill="#3b82f6" stroke="white" stroke-width="1.5"/>
  <!-- 09:15 → x=170 -->
  <circle cx="170" cy="75" r="6" fill="#3b82f6" stroke="white" stroke-width="1.5"/>
  <!-- 11:30 → x=260 -->
  <circle cx="260" cy="75" r="6" fill="#3b82f6" stroke="white" stroke-width="1.5"/>
  <!-- 14:00 → x=360 -->
  <circle cx="360" cy="75" r="6" fill="#3b82f6" stroke="white" stroke-width="1.5"/>
  <!-- 16:30 → x=460 -->
  <circle cx="460" cy="75" r="6" fill="#3b82f6" stroke="white" stroke-width="1.5"/>

  <!-- Cluster feed markers (amber) -->
  <!-- 19:00 → x=560 -->
  <circle cx="560" cy="75" r="6" fill="#f59e0b" stroke="white" stroke-width="1.5"/>
  <!-- 19:45 → x=590 -->
  <circle cx="590" cy="75" r="6" fill="#f59e0b" stroke="white" stroke-width="1.5"/>
  <!-- 20:25 → x=617 -->
  <circle cx="617" cy="75" r="6" fill="#f59e0b" stroke="white" stroke-width="1.5"/>

  <!-- Time labels above cluster feeds -->
  <text x="553" y="63" text-anchor="middle" font-size="9" fill="#d97706">19:00</text>
  <text x="590" y="63" text-anchor="middle" font-size="9" fill="#d97706">19:45</text>
  <text x="624" y="63" text-anchor="middle" font-size="9" fill="#d97706">20:25</text>

  <!-- Legend -->
  <circle cx="295" cy="122" r="5" fill="#3b82f6"/>
  <text x="306" y="126" font-size="11" fill="#64748b">Regular feed</text>
  <circle cx="415" cy="122" r="5" fill="#f59e0b"/>
  <text x="426" y="126" font-size="11" fill="#64748b">Cluster feed</text>

</svg>
